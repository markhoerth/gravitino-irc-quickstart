# ─────────────────────────────────────────────────────────────────────────────
# Trino Iceberg Catalog — Gravitino IRC
#
# This configures the Trino iceberg connector to use Gravitino IRC as its
# catalog backend via the Iceberg REST protocol.
#
# Catalog name in Trino: 'iceberg'  (derived from the filename iceberg.properties)
#
# Usage in trino-cli:
#   USE iceberg.default;
#   SHOW TABLES;
#   SELECT * FROM iceberg.myschema.mytable;
# ─────────────────────────────────────────────────────────────────────────────

connector.name=iceberg

# ── REST Catalog ──────────────────────────────────────────────────────────────
iceberg.catalog.type=rest
iceberg.rest-catalog.uri=http://gravitino-irc:9001/iceberg

# Optional: warehouse path (informational; the IRC manages this)
# iceberg.rest-catalog.warehouse=s3://warehouse/

# ── Native S3 Filesystem (for Trino >= 430) ───────────────────────────────────
# Uses Trino's built-in S3 client rather than the legacy Hive connector S3 shim.
# This is the recommended approach for current Trino versions.
fs.native-s3.enabled=true
s3.endpoint=http://minio:9000
s3.path-style-access=true
s3.aws-access-key=minioadmin
s3.aws-secret-key=minioadmin123
s3.region=us-east-1

# ── Iceberg Table Settings ────────────────────────────────────────────────────
iceberg.file-format=PARQUET
iceberg.compression-codec=ZSTD

