# ─────────────────────────────────────────────────────────────────────────────
# Gravitino Iceberg REST Server Configuration
# Standalone server mode (gravitino-iceberg-rest-server.conf)
#
# This file is mounted into the IRC container at:
#   /opt/gravitino/conf/gravitino-iceberg-rest-server.conf
#
# Reference: https://gravitino.apache.org/docs/latest/iceberg-rest-service/
# ─────────────────────────────────────────────────────────────────────────────

# ── HTTP Server ───────────────────────────────────────────────────────────────
gravitino.iceberg-rest.host = 0.0.0.0
gravitino.iceberg-rest.httpPort = 9001

# ── Catalog Backend: JDBC (MySQL) ─────────────────────────────────────────────
# Iceberg namespace and table metadata is persisted in MySQL.
# The IRC creates the required schema tables on startup when jdbc-initialize=true.
#
# NOTE: If you are running multiple IRC instances sharing the same MySQL DB,
# set jdbc-initialize=false after the first run and create tables manually.
# See: https://iceberg.apache.org/docs/latest/jdbc/
gravitino.iceberg-rest.catalog-backend = jdbc

# MySQL connection — hostname 'mysql' matches the docker-compose service name
gravitino.iceberg-rest.uri = jdbc:mysql://mysql:3306/iceberg_catalog?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC

gravitino.iceberg-rest.jdbc-user = iceberg
gravitino.iceberg-rest.jdbc-password = iceberg_password
gravitino.iceberg-rest.jdbc-driver = com.mysql.cj.jdbc.Driver
gravitino.iceberg-rest.jdbc-initialize = true

# Catalog backend name — used to namespace tables in the JDBC backend.
# Keep this consistent if you ever point a separate Iceberg JDBC catalog at the same DB.
gravitino.iceberg-rest.catalog-backend-name = gravitino_irc

# ── Object Storage: MinIO (S3-compatible) ─────────────────────────────────────
# S3FileIO is used for all data and metadata file I/O.
# Credentials are supplied via AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY env vars.
gravitino.iceberg-rest.warehouse = s3://warehouse/
gravitino.iceberg-rest.io-impl = org.apache.iceberg.aws.s3.S3FileIO

# MinIO-specific S3 settings
gravitino.iceberg-rest.s3.endpoint = http://minio:9000
gravitino.iceberg-rest.s3.path-style-access = true
gravitino.iceberg-rest.s3.region = us-east-1

# ── Iceberg Table Defaults ────────────────────────────────────────────────────
# Default file format and write settings for tables created via IRC.
# Engines can override these per-table via WITH clause.
gravitino.iceberg-rest.default-file-format = parquet

# S3 credentials — FileIO
gravitino.iceberg-rest.s3.access-key-id = minioadmin
gravitino.iceberg-rest.s3.secret-access-key = minioadmin123

# Credential provider (required by Gravitino IRC for table creation)
gravitino.iceberg-rest.credential-providers = s3-secret-key
gravitino.iceberg-rest.s3-secret-key.credential-provider.type = S3_SECRET_KEY
gravitino.iceberg-rest.s3-secret-key.s3.access-key-id = minioadmin
gravitino.iceberg-rest.s3-secret-key.s3.secret-access-key = minioadmin123
gravitino.iceberg-rest.s3-secret-key.s3.region = us-east-1

# ── Thread Pool ───────────────────────────────────────────────────────────────
# Tune for your available CPUs; defaults are usually fine for local testing.
# gravitino.iceberg-rest.minThreads = 8
# gravitino.iceberg-rest.maxThreads = 64
