# ─────────────────────────────────────────────────────────────────────────────
# Spark Defaults — Gravitino IRC Quickstart
#
# Catalog: 'gravitino_irc' — an Iceberg REST catalog backed by Gravitino IRC.
# All Spark SQL, spark-shell, and pyspark sessions pick up these settings.
#
# Usage in spark-sql / spark-shell:
#   USE gravitino_irc.default;
#   CREATE TABLE ...
#   INSERT INTO ...
#   SELECT ...
# ─────────────────────────────────────────────────────────────────────────────

# ── Iceberg Extensions ────────────────────────────────────────────────────────
spark.sql.extensions                    org.apache.iceberg.spark.extensions.IcebergSparkSessionExtensions

# ── Gravitino IRC Catalog ─────────────────────────────────────────────────────
# Catalog name: gravitino_irc
# Type: REST — talks directly to the IRC endpoint, not the Gravitino server API.
spark.sql.catalog.gravitino_irc                             org.apache.iceberg.spark.SparkCatalog
spark.sql.catalog.gravitino_irc.type                        rest
spark.sql.catalog.gravitino_irc.uri                         http://gravitino-irc:9001/iceberg

# ── S3 / MinIO FileIO ─────────────────────────────────────────────────────────
# The Iceberg catalog uses S3FileIO to read/write data files from MinIO.
spark.sql.catalog.gravitino_irc.io-impl                     org.apache.iceberg.aws.s3.S3FileIO
spark.sql.catalog.gravitino_irc.s3.endpoint                 http://minio:9000
spark.sql.catalog.gravitino_irc.s3.path-style-access        true
# Credentials are inherited from AWS_ACCESS_KEY_ID / AWS_SECRET_ACCESS_KEY env vars.
# If you need to set them explicitly:
# spark.sql.catalog.gravitino_irc.s3.access-key-id          minioadmin
# spark.sql.catalog.gravitino_irc.s3.secret-access-key      minioadmin123

# ── Hadoop S3A (for spark.read.parquet, spark.read.csv etc on s3a:// paths) ──
spark.hadoop.fs.s3a.impl                    org.apache.hadoop.fs.s3a.S3AFileSystem
spark.hadoop.fs.s3a.endpoint                http://minio:9000
spark.hadoop.fs.s3a.path.style.access       true
spark.hadoop.fs.s3a.connection.ssl.enabled  false
# Credentials come from environment; set explicitly if needed:
# spark.hadoop.fs.s3a.access.key            minioadmin
# spark.hadoop.fs.s3a.secret.key            minioadmin123

# ── Default Catalog ───────────────────────────────────────────────────────────
# Makes 'gravitino_irc' the default so you don't need to prefix every query.
spark.sql.defaultCatalog                    gravitino_irc

# ── Spark UI & General ────────────────────────────────────────────────────────
spark.ui.port                               4040
spark.driver.bindAddress                    0.0.0.0

# ── Serialization ─────────────────────────────────────────────────────────────
spark.sql.parquet.datetimeRebaseModeInWrite  CORRECTED
spark.sql.parquet.int96RebaseModeInWrite     CORRECTED
